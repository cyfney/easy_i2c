name=EasyI2c
version=1.0.0
author=Cyfney Anka
maintainer=cyfney-anka@qq.com
sentence=A lightweight and easy-to-use I2C library for reading and writing device registers with template support.
paragraph=This library simplifies the process of communicating with I2C devices by wrapping the standard Arduino Wire library. It provides convenient template functions (Read<T> and Write<T>) that allow you to directly read and write standard data types (like int, float, structs) to specific device memory addresses, handling the low-level byte manipulation automatically. It supports both AVR and ESP32 architectures.
